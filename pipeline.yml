### Настройки MAVEN ###
maven:
  settings_id: "settings"
  home: "Maven 3.9.6"
  jdk: "openjdk-21"
  use_for_deploy: true

### Настройки NodeJS ###
npm:
  config_id: "npm_config"
  version: "v20.9.0-linux-x64"

### Свойства вашего дистрибутива ###
fp:
  groupId: "io.github.ObraztsovOleg"
  artifactId: "efs-devops-pipeline" ## КЭ для которого есть область в  https://sbrf-nexus.sigma.sbrf.ru/nexus/
  version: "D-1.0.0" # любая
  component_code: cije

bh:
  - name: test.app.backend.sonar
    repo: ssh://git@github.com/ObraztsovOleg/test.backend.git
    branch: master
    cmd:
      - "clean install -U -P build-config,spring"
    sonarPomConfigured: false
    sonarSkip: true
    create_tag: false
    outputs: [
        "target/*.war"
    ]
    update_version: false
    skip_rn: true
    
nexus:
  creds: "deploy-creds" # id (создадим позже) ТУЗа, c доступом на чтение из:
  use_maven: true


distribution:
  - type: maven
    url: "https://maven.pkg.github.com/ObraztsovOleg/maven"
    serverId: "nexus_cd"

qgm:
  repository: "Nexus_PROD"
  creds: "deploy-creds"

### Настройки сборки Dockerfile ###
docker:
  builder_token: "deploy-docker" # id ТУЗа с доступ на запись в nexus3
  registry_address: "docker.io"
  nexus_url: "k32nc23423" # путь до вашей области с образами
  additional_registries:
    - "https://index.docker.io/v1/"

extensions:
  - name: testSBOM
    repo: ssh://git@github.com/ObraztsovOleg/demo.config.git
    branch: master
    script_path: generateSBOMCyclonedx.groovy
    stage: build
    phase: after
    cdxgen: cdxgen-12.6.0
    cdxgen_path: cdxgen
    cyclonedx_cli: cyclonedx-cli-0.32.0
    cyclonedx_cli_path: cyclonedx
    cache:
      scanned_image_cache: docker.io/k32nc23423/sbom-cache:local
      scanner_image: ghcr.io/cyclonedx/cdxgen:v12
      builder: buildx
    args:
      - "--fail-on-error"

disabled_extensions:
  - "makeReleaseNotes"
  - "uploadQGFlags"
  - "updateVersionConf"
  - "analyzeDependencies"
